# nixpacks.toml — Railway build configuration

[phases.setup]
aptPkgs = [
  "chromium",
  "chromium-driver",
  "xvfb",
  "libnss3",
  "libatk1.0-0",
  "libatk-bridge2.0-0",
  "libcups2",
  "libdrm2",
  "libxkbcommon0",
  "libxcomposite1",
  "libxdamage1",
  "libxrandr2",
  "libgbm1",
  "libasound2",
  "libpango-1.0-0",
  "libcairo2"
]

[phases.install]
cmds = [
  "pip install -r requirements.txt",
]

[variables]
CHROME_BIN = "chromium"

# Chromium flags required for headless operation inside a container:
# --no-sandbox       : required when running as root (Railway containers run as root)
# --disable-dev-shm-usage : /dev/shm is too small in most container envs; use /tmp instead
CHROMIUM_FLAGS = "--no-sandbox --disable-dev-shm-usage --disable-gpu --headless"

[start]
cmd = "uvicorn main:app --host 0.0.0.0 --port $PORT"
